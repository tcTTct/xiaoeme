apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-ai-agent-demo
  namespace: xiaoeme
  labels:
    app: vulnerable-ai-agent-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-ai-agent-demo
  template:
    metadata:
      labels:
        app: vulnerable-ai-agent-demo
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: app
          # CI overwrites this to registry.tfan.au/vulnerable-ai-agent-demo:<sha> via `kubectl set image`
          image: registry.tfan.au/vulnerable-ai-agent-demo:latest
          ports:
            - containerPort: 8080
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vulnerable-ai-agent-demo-secret
                  key: jwt-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vulnerable-ai-agent-demo-secret
                  key: openai-api-key
                  optional: true
            - name: OPENAI_MODEL
              value: "gpt-4o-mini"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
